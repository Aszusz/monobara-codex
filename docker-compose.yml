services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: monobara
      POSTGRES_PASSWORD: monobara
      POSTGRES_DB: monobara
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monobara -d monobara"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres-18-data:
