name: CD

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_WEBHOOK_URL: https://fullstack.typestrict.dev/deploy/monobara-codex

jobs:
  publish:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            image: ghcr.io/aszusz/monobara-codex-web
            file: apps/web/Dockerfile
            build_args: |
              VITE_API_URL=
          - name: api
            image: ghcr.io/aszusz/monobara-codex-api
            file: apps/api/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  deploy:
    name: Trigger VPS deploy
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"repo\":\"${GITHUB_REPOSITORY}\",\"tag\":\"${TAG}\"}" \
            "${DEPLOY_WEBHOOK_URL}"
