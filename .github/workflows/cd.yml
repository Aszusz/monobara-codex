name: CD

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_WEBHOOK_URL: https://fullstack.typestrict.dev/deploy/monobara-codex

jobs:
  publish:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            image: ghcr.io/aszusz/monobara-codex-web
            file: apps/web/Dockerfile
            build_args: |
              VITE_API_URL=
          - name: api
            image: ghcr.io/aszusz/monobara-codex-api
            file: apps/api/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  deploy:
    name: Trigger VPS deploy
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          compose_sha256="$(sha256sum docker-compose.yml | cut -d ' ' -f1)"

          payload="$(jq -n \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg tag "${TAG}" \
            --arg commit "${COMMIT}" \
            --arg composeSha256 "${compose_sha256}" \
            --arg webImage "ghcr.io/aszusz/monobara-codex-web:${TAG}" \
            --arg apiImage "ghcr.io/aszusz/monobara-codex-api:${TAG}" \
            '{
              repo: $repo,
              tag: $tag,
              commit: $commit,
              composeSha256: $composeSha256,
              images: {
                WEB_IMAGE: $webImage,
                API_IMAGE: $apiImage
              }
            }'
          )"

          timestamp="$(date +%s)"
          signature="$(printf '%s.%s' "${timestamp}" "${payload}" \
            | openssl dgst -sha256 -hmac "${DEPLOY_WEBHOOK_SECRET}" -binary \
            | xxd -p -c 256)"

          curl -fsS \
            -X POST \
            -H "X-Deploy-Timestamp: ${timestamp}" \
            -H "X-Deploy-Signature: sha256=${signature}" \
            -H "Content-Type: application/json" \
            --data "${payload}" \
            "${DEPLOY_WEBHOOK_URL}"
